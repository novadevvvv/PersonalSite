name: Persist SkidChecker scans

on:
  push:
    branches: ["main"]
    paths:
      - "website/data/skidcheckers/_incoming/*.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  persist:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Process queued scans
        run: node scripts/process-skidchecker-submissions.mjs

      - name: Commit persisted scans
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No generated scan changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/data/skidcheckers website/skidchecker
          git commit -m "Persist SkidChecker scan reports"
          git push