<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>nova</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<style>
		:root {
			color-scheme: light;
			--bg: #d9f1f4;
			--panel: #eefbfd;
			--panel-edge: #c3e7ee;
			--text: #173b4a;
			--muted: #54737d;
			--accent: #2e7c97;
			--accent-soft: #d7edf3;
			--border: rgba(46, 124, 151, 0.14);
			--shadow: rgba(38, 101, 122, 0.14);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: clamp(18px, 3vw, 30px);
			overflow: hidden;
			background: var(--bg);
			color: var(--text);
			font-family: "Trebuchet MS", "Segoe UI", sans-serif;
		}

		.bubble-field {
			position: fixed;
			inset: 0;
			pointer-events: none;
			overflow: hidden;
			z-index: 0;
		}

		.bubble {
			position: absolute;
			bottom: -120px;
			border-radius: 50%;
			background: rgba(227, 246, 250, 0.28);
			border: 1px solid rgba(255, 255, 255, 0.52);
			box-shadow:
				inset -10px -12px 20px rgba(116, 184, 204, 0.14),
				inset 6px 6px 10px rgba(255, 255, 255, 0.38),
				0 0 0 1px rgba(255, 255, 255, 0.06);
			backdrop-filter: blur(1px);
			opacity: 0.78;
			animation: float-up linear infinite;
		}

		.bubble::before {
			content: "";
			position: absolute;
			inset: 16% auto auto 20%;
			width: 24%;
			height: 24%;
			border-radius: 50%;
			background: rgba(255, 255, 255, 0.72);
			filter: blur(2px);
		}

		.bubble::after {
			content: "";
			position: absolute;
			inset: auto 20% 18% auto;
			width: 12%;
			height: 12%;
			border-radius: 50%;
			background: rgba(255, 255, 255, 0.3);
			filter: blur(1px);
		}

		.bubble.one {
			left: 8%;
			width: 52px;
			height: 52px;
			animation-duration: 17s;
			animation-delay: -3s;
		}

		.bubble.two {
			left: 15%;
			width: 26px;
			height: 26px;
			animation-duration: 12s;
			animation-delay: -8s;
		}

		.bubble.three {
			left: 24%;
			width: 34px;
			height: 34px;
			animation-duration: 14.5s;
			animation-delay: -5s;
		}

		.bubble.four {
			left: 33%;
			width: 68px;
			height: 68px;
			animation-duration: 19s;
			animation-delay: -10s;
		}

		.bubble.five {
			left: 42%;
			width: 18px;
			height: 18px;
			animation-duration: 11s;
			animation-delay: -1s;
		}

		.bubble.six {
			left: 51%;
			width: 44px;
			height: 44px;
			animation-duration: 16s;
			animation-delay: -12s;
		}

		.bubble.seven {
			left: 59%;
			width: 24px;
			height: 24px;
			animation-duration: 13s;
			animation-delay: -6s;
		}

		.bubble.eight {
			left: 66%;
			width: 58px;
			height: 58px;
			animation-duration: 18.5s;
			animation-delay: -14s;
		}

		.bubble.nine {
			left: 74%;
			width: 20px;
			height: 20px;
			animation-duration: 11.5s;
			animation-delay: -4s;
		}

		.bubble.ten {
			left: 81%;
			width: 38px;
			height: 38px;
			animation-duration: 15.5s;
			animation-delay: -9s;
		}

		.bubble.eleven {
			left: 88%;
			width: 28px;
			height: 28px;
			animation-duration: 12.5s;
			animation-delay: -2s;
		}

		.bubble.twelve {
			left: 93%;
			width: 46px;
			height: 46px;
			animation-duration: 17.5s;
			animation-delay: -11s;
		}

		main {
			position: relative;
			z-index: 1;
			width: min(100%, 540px);
			overflow: hidden;
			padding: 72px clamp(24px, 4vw, 34px) clamp(24px, 4vw, 34px);
			border-radius: 24px;
			background: var(--panel);
			box-shadow: 0 18px 40px var(--shadow);
			backdrop-filter: blur(12px);
			transition: transform 180ms ease, box-shadow 180ms ease;
		}

		main::before {
			content: "";
			position: absolute;
			inset: 0 auto auto 0;
			width: 100%;
			height: 52px;
			background: var(--panel-edge);
		}

		main:hover {
			transform: translateY(-2px);
			box-shadow: 0 24px 50px rgba(38, 101, 122, 0.18);
		}

		.window-bar {
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			height: 52px;
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 0 16px 0 18px;
		}

		.window-title {
			font-size: 0.92rem;
			font-weight: 700;
			letter-spacing: 0.02em;
			color: var(--accent);
		}

		.window-controls {
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.window-button {
			width: 30px;
			height: 30px;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			border-radius: 10px;
			background: rgba(255, 255, 255, 0.48);
			border: 1px solid var(--border);
			color: var(--text);
			font-size: 0.95rem;
			line-height: 1;
		}

		.window-button i {
			font-size: 0.9rem;
		}

		.window-button.expand {
			font-size: 0.86rem;
		}

		h1 {
			margin: 0 0 8px;
			font-size: clamp(2.5rem, 8vw, 4.5rem);
			line-height: 0.95;
			letter-spacing: -0.04em;
		}

		p {
			margin: 0;
			color: var(--muted);
			font-size: 1.05rem;
		}

		.subtitle {
			max-width: 24ch;
			font-size: 1.08rem;
		}

		.media-panel {
			margin-top: 18px;
			display: grid;
			grid-template-columns: 76px 1fr;
			gap: 14px;
			align-items: start;
			padding: 11px;
			border-radius: 18px;
			background: rgba(239, 251, 253, 0.62);
			border: 1px solid var(--border);
			box-shadow: 0 6px 16px rgba(38, 101, 122, 0.05);
			opacity: 0.84;
			transition: opacity 160ms ease, background 160ms ease, box-shadow 160ms ease;
		}

		.media-panel:hover,
		.media-panel:focus-within {
			opacity: 1;
			background: rgba(239, 251, 253, 0.8);
			box-shadow: 0 10px 24px rgba(38, 101, 122, 0.08);
		}

		.media-panel img {
			display: block;
			width: 100%;
			aspect-ratio: 1;
			object-fit: cover;
			border-radius: 14px;
			border: 1px solid var(--border);
			box-shadow: 0 4px 12px rgba(38, 101, 122, 0.08);
			filter: saturate(0.92);
		}

		.media-copy {
			display: grid;
			gap: 8px;
		}

		.media-head {
			display: flex;
			align-items: start;
			justify-content: space-between;
			gap: 12px;
		}

		.media-title {
			font-size: 1rem;
			font-weight: 700;
			color: var(--text);
		}

		.media-artist {
			font-size: 0.88rem;
			color: var(--muted);
		}

		.media-meta {
			display: grid;
			gap: 3px;
		}

		.player-row {
			display: grid;
			gap: 8px;
		}

		.play-button {
			width: 48px;
			height: 48px;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 0;
			border: 0;
			border-radius: 16px;
			background: #d7edf3;
			color: var(--accent);
			font-size: 1.4rem;
			font-weight: 700;
			box-shadow: 0 6px 14px rgba(46, 124, 151, 0.08);
			cursor: pointer;
			transition: transform 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
			flex-shrink: 0;
		}

		.play-button i {
			font-size: 1.55rem;
			line-height: 1;
		}

		.play-button:hover,
		.play-button:focus-visible {
			transform: translateY(-1px);
			box-shadow: 0 10px 18px rgba(46, 124, 151, 0.12);
		}

		.play-button:disabled {
			opacity: 0.55;
			cursor: not-allowed;
			transform: none;
			box-shadow: none;
		}

		.player-progress {
			display: grid;
			gap: 6px;
			padding-top: 2px;
		}

		.progress-bar {
			-webkit-appearance: none;
			appearance: none;
			width: 100%;
			height: 5px;
			margin: 0;
			border-radius: 999px;
			outline: none;
			background: rgba(46, 124, 151, 0.12);
			cursor: pointer;
		}

		.progress-bar::-webkit-slider-thumb {
			-webkit-appearance: none;
			appearance: none;
			width: 12px;
			height: 12px;
			border: 0;
			border-radius: 50%;
			background: #ffffff;
			box-shadow: 0 0 0 3px rgba(46, 124, 151, 0.14);
		}

		.progress-bar::-moz-range-thumb {
			width: 12px;
			height: 12px;
			border: 0;
			border-radius: 50%;
			background: #ffffff;
			box-shadow: 0 0 0 3px rgba(46, 124, 151, 0.14);
		}

		.progress-bar::-moz-range-track {
			height: 5px;
			border-radius: 999px;
			background: rgba(46, 124, 151, 0.12);
		}

		.time-row {
			display: flex;
			justify-content: space-between;
			font-size: 0.74rem;
			color: var(--muted);
			opacity: 0.88;
		}

		.stack {
			display: grid;
			gap: 12px;
			margin-top: 22px;
		}

		.stack p {
			padding: 12px 14px;
			border-radius: 14px;
			background: rgba(255, 255, 255, 0.45);
			border: 1px solid var(--border);
			transition: transform 140ms ease, background 140ms ease;
		}

		.stack p:hover {
			transform: translateX(4px);
			background: #e0f3f7;
		}

		.chip-row {
			display: flex;
			flex-wrap: wrap;
			gap: 10px;
			margin-top: 24px;
		}

		.chip {
			padding: 10px 14px;
			border-radius: 999px;
			background: var(--accent-soft);
			color: var(--text);
			font-size: 0.95rem;
			border: 1px solid var(--border);
		}

		a {
			display: inline-flex;
			align-items: center;
			justify-content: space-between;
			margin-top: 28px;
			width: 100%;
			padding: 14px 16px;
			border-radius: 14px;
			background: rgba(255, 255, 255, 0.45);
			color: var(--text);
			text-decoration: none;
			font-weight: 700;
			border: 1px solid var(--border);
			transition: transform 140ms ease, background 140ms ease, box-shadow 140ms ease;
		}

		a span {
			display: inline-flex;
			align-items: center;
			gap: 10px;
		}

		a strong {
			font-size: 1rem;
		}

		a small {
			color: var(--muted);
			font-size: 0.86rem;
			font-weight: 600;
		}

		a .arrow {
			width: 34px;
			height: 34px;
			border-radius: 10px;
			background: var(--accent-soft);
			color: var(--accent);
			justify-content: center;
			font-size: 1rem;
			flex-shrink: 0;
		}

		a .arrow i {
			font-size: 1rem;
		}

		a:hover,
		a:focus-visible {
			transform: translateY(-1px);
			background: #def2f7;
			box-shadow: 0 10px 20px rgba(46, 124, 151, 0.14);
		}

		a:hover .arrow,
		a:focus-visible .arrow {
			background: #c8e8f0;
		}


		@keyframes float-up {
			0% {
				transform: translate3d(0, 0, 0) scale(0.88);
				opacity: 0;
			}

			10% {
				opacity: 0.72;
			}

			50% {
				transform: translate3d(12px, -46vh, 0) scale(1);
			}

			75% {
				transform: translate3d(-8px, -78vh, 0) scale(1.03);
			}

			100% {
				transform: translate3d(10px, -112vh, 0) scale(1.08);
				opacity: 0;
			}
		}

		@media (max-width: 640px) {
			main {
				padding: 68px 26px 26px;
				border-radius: 20px;
			}

			.window-bar {
				padding: 0 12px 0 14px;
			}

			.window-button {
				width: 28px;
				height: 28px;
			}

			.bubble.one,
			.bubble.four,
			.bubble.eight,
			.bubble.twelve {
				width: 44px;
				height: 44px;
			}

			.media-panel {
				grid-template-columns: 72px 1fr;
				gap: 12px;
				padding: 10px;
			}

			.media-head {
				align-items: center;
			}

			.play-button {
				width: 44px;
				height: 44px;
				font-size: 1.2rem;
			}

			.play-button i {
				font-size: 1.35rem;
			}

			.stack p {
				padding: 11px 12px;
			}

			a {
				padding: 13px 14px;
			}
		}
	</style>
</head>
<body>
	<div class="bubble-field" aria-hidden="true">
		<div class="bubble one"></div>
		<div class="bubble two"></div>
		<div class="bubble three"></div>
		<div class="bubble four"></div>
		<div class="bubble five"></div>
		<div class="bubble six"></div>
		<div class="bubble seven"></div>
		<div class="bubble eight"></div>
		<div class="bubble nine"></div>
		<div class="bubble ten"></div>
		<div class="bubble eleven"></div>
		<div class="bubble twelve"></div>
	</div>
	<main>
		<div class="window-bar" aria-hidden="true">
			<span class="window-title">nova.exe</span>
			<div class="window-controls">
				<span class="window-button" title="Minimize"><i class="bi bi-dash"></i></span>
				<span class="window-button expand" title="Maximize"><i class="bi bi-square"></i></span>
				<span class="window-button" title="Close"><i class="bi bi-x-lg"></i></span>
			</div>
		</div>
		<p class="subtitle">BWAAAAAAAAAAAAAAA :3</p>

		<div class="media-panel">
			<img src="media/impostor-syndrome-cover.jpg" alt="No Dogs Allowed cover art">
			<div class="media-copy">
				<div class="media-head">
					<div class="media-meta">
						<span class="media-title">Impostor Syndrome</span>
						<span class="media-artist">Sidney Gish</span>
					</div>
					<button class="play-button" id="play-button" type="button" aria-label="Play track"><i class="bi bi-play-fill"></i></button>
				</div>
				<div class="player-row">
					<div class="player-progress">
						<input class="progress-bar" id="progress-bar" type="range" min="0" max="100" value="0" aria-label="Track progress">
						<div class="time-row">
							<span id="current-time">0:00</span>
							<span id="duration">0:00</span>
						</div>
					</div>
				</div>
				<audio id="audio-player" preload="metadata" loop>
					<source src="media/is.mp3" type="audio/mpeg">
				</audio>
			</div>
		</div>

		<div class="stack">
			<p>| she/her</p>
			<p>| 5teen</p>
			<p>| programmer</p>
			<p>| calico + shark</p>
			<p>| developer</p>
		</div>

		<a href="https://discord.spire-mc.net/">
			<span>
				<strong>Spire Network Discord</strong>
			</span>
			<span class="arrow" aria-hidden="true"><i class="bi bi-arrow-up-right"></i></span>
		</a>

	</main>
	<script>
		const audio = document.getElementById("audio-player");
		const playButton = document.getElementById("play-button");
		const progressBar = document.getElementById("progress-bar");
		const currentTime = document.getElementById("current-time");
		const duration = document.getElementById("duration");

		function formatTime(value) {
			if (!Number.isFinite(value)) {
				return "0:00";
			}

			const minutes = Math.floor(value / 60);
			const seconds = Math.floor(value % 60);
			return `${minutes}:${String(seconds).padStart(2, "0")}`;
		}

		function setProgress(value) {
			progressBar.value = value;
			progressBar.style.background = `linear-gradient(90deg, var(--accent) 0%, var(--accent) ${value}%, rgba(46, 124, 151, 0.12) ${value}%, rgba(46, 124, 151, 0.12) 100%)`;
		}

		function syncButton() {
			playButton.innerHTML = audio.paused
				? '<i class="bi bi-play-fill"></i>'
				: '<i class="bi bi-pause-fill"></i>';
			playButton.setAttribute("aria-label", audio.paused ? "Play track" : "Pause track");
		}

		playButton.addEventListener("click", async () => {
			if (!audio.getAttribute("src") && !audio.querySelector("source")?.getAttribute("src")) {
				return;
			}

			try {
				if (audio.paused) {
					await audio.play();
				} else {
					audio.pause();
				}
			} catch {
				playButton.disabled = true;
			}
		});

		audio.addEventListener("loadedmetadata", () => {
			duration.textContent = formatTime(audio.duration);
			playButton.disabled = false;
		});

		audio.addEventListener("timeupdate", () => {
			const percent = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
			setProgress(percent);
			currentTime.textContent = formatTime(audio.currentTime);
		});

		audio.addEventListener("play", syncButton);
		audio.addEventListener("pause", syncButton);
		audio.addEventListener("ended", () => {
			audio.currentTime = 0;
			setProgress(0);
			syncButton();
		});

		audio.addEventListener("error", () => {
			playButton.disabled = true;
			duration.textContent = "upload is.mp3";
		});

		progressBar.addEventListener("input", () => {
			setProgress(progressBar.value);
		});

		progressBar.addEventListener("change", () => {
			if (audio.duration) {
				audio.currentTime = (progressBar.value / 100) * audio.duration;
			}
		});

		playButton.disabled = true;
		audio.volume = 0.055;
		setProgress(0);
		syncButton();
	</script>
</body>
</html>
