<script>
// Calculate years since Oct 29, 2010 in Adelaide time (UTC+9:30)
function getAdelaideYearsSince(dateString) {
  // Adelaide is UTC+9:30
  const adelaideOffset = 10.5 * 60; // minutes (accounts for DST)
  const now = new Date();
  // Convert now to Adelaide time
  const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
  const adelaideNow = new Date(utc + (adelaideOffset * 60000));
  const start = new Date(dateString);
  // Calculate difference in years
  let years = adelaideNow.getFullYear() - start.getFullYear();
  // If before the anniversary this year, subtract 1
  if (
    adelaideNow.getMonth() < start.getMonth() ||
    (adelaideNow.getMonth() === start.getMonth() && adelaideNow.getDate() < start.getDate())
  ) {
    years--;
  }
  return years;
}

document.addEventListener('DOMContentLoaded', function() {
  const years = getAdelaideYearsSince('2010-10-29T00:00:00+09:30');
  const yearsSpan = document.getElementById('years-since');
  if (yearsSpan) yearsSpan.textContent = years;
});
fetch('/api/library')
  .then(res => res.json())
  .then(libraryImages => {
    const libraryDiv = document.querySelector('.library');

    libraryImages.forEach(src => {
      const img = document.createElement('img');

      img.src = src;
      img.alt = src.split('/').pop();

      libraryDiv.appendChild(img);
    });
  })
  .catch(console.error);
</script>
