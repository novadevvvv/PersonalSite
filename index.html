<script>
// Calculate Martian sols since Oct 29, 2010 in Adelaide time (UTC+9:30)
function getAdelaideSolsSince(dateString) {
  // Adelaide is UTC+9:30
  const adelaideOffset = 10.5 * 60; // minutes (accounts for DST)
  const now = new Date();
  // Convert now to Adelaide time
  const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
  const adelaideNow = new Date(utc + (adelaideOffset * 60000));
  const start = new Date(dateString);
  // Martian sol: 24h 39m 35s = 88775 seconds
  const solMs = (24 * 60 * 60 + 39 * 60 + 35) * 1000;
  const diffMs = adelaideNow - start;
  const sols = diffMs / solMs;
  return sols;
}

document.addEventListener('DOMContentLoaded', function() {
  const sols = getAdelaideSolsSince('2010-10-29T00:00:00+09:30');
  const yearsSpan = document.getElementById('years-since');
  if (yearsSpan) yearsSpan.textContent = sols.toLocaleString(undefined, { maximumFractionDigits: 2 });

  // Fetch static library.json for images
  fetch('src/data/library.json')
    .then(res => res.json())
    .then(libraryImages => {
      const libraryDiv = document.querySelector('.library');
      libraryImages.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.alt = src.split('/').pop();
        libraryDiv.appendChild(img);
      });
    })
    .catch(console.error);
});
</script>
