<div class="library"></div>

<script>
fetch('/api/library')
  .then(res => res.json())
  .then(libraryImages => {
    const libraryDiv = document.querySelector('.library');

    libraryImages.forEach(src => {
      const img = document.createElement('img');

      img.src = src;
      img.alt = src.split('/').pop();

      libraryDiv.appendChild(img);
    });
  })
  .catch(console.error);
</script>
