<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Nova • Project Stats</title>
	<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
	<meta name="description" content="Daily visit trend stats for a project.">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<link href="assets/css/site.css" rel="stylesheet">
</head>
<body>
	<nav class="navbar navbar-expand-lg sticky-top">
		<div class="container py-2">
			<a class="navbar-brand fw-bold" href="index.html">Nova</a>
			<div class="ms-auto d-flex gap-2">
				<a href="projects.html" class="btn btn-outline-light btn-sm"><i class="bi bi-grid-1x2 me-2"></i>All Projects</a>
				<a href="index.html" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-2"></i>Home</a>
			</div>
		</div>
	</nav>

	<main class="py-5">
		<section class="container py-4">
			<div class="glass-card stats-page-card">
				<div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
					<div>
						<h1 id="statsTitle" class="fw-bold mb-2">Project Stats</h1>
						<p id="statsSubtitle" class="text-secondary mb-0">Daily visits trend over time.</p>
					</div>
				</div>

				<div class="row g-3 mb-4">
					<div class="col-12 col-md-4">
						<div class="totals-item h-100">
							<p id="currentVisits" class="totals-number mb-1">0</p>
							<small class="text-secondary">Current Visits</small>
						</div>
					</div>
					<div class="col-12 col-md-4">
						<div class="totals-item h-100">
							<p id="totalGrowth" class="totals-number mb-1">0</p>
							<small class="text-secondary">Total Growth</small>
						</div>
					</div>
					<div class="col-12 col-md-4">
						<div class="totals-item h-100">
							<p id="avgDailyGrowth" class="totals-number mb-1">0</p>
							<small class="text-secondary">Avg Daily Growth</small>
						</div>
					</div>
				</div>

				<div class="chart-wrap">
					<canvas id="visitsChart" height="120"></canvas>
				</div>
				<div id="statsError" class="alert alert-danger mt-4 mb-0 d-none"></div>
			</div>
		</section>
	</main>

	<footer class="py-4">
		<div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
			<small class="text-secondary">© 2026 Nova.</small>
		</div>
	</footer>

	<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
	<script type="module" src="assets/js/project-stats-page.js"></script>
</body>
</html>
